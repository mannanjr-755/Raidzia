# RSS Construction ERP — Netlify (frontend only)
#
# Express API CANNOT run on Netlify. Deploy API separately, then configure:
#
# REQUIRED (pick one) — set in Netlify → Site settings → Environment variables:
#   NEXT_PUBLIC_API_URL = https://YOUR-PUBLIC-API.example.com/api   ← recommended
#   OR
#   API_ORIGIN          = https://YOUR-PUBLIC-API.example.com
#
# Also set on the API host:
#   CORS_ORIGINS = https://YOUR-SITE.netlify.app
#
# NEVER set API_ORIGIN=http://127.0.0.1:4000 on Netlify
# (causes DNS_HOSTNAME_RESOLVED_PRIVATE).

[build]
  command = "npm run build:netlify"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  SKIP_PRISMA_GENERATE = "true"
  NETLIFY = "true"
  SKIP_PRIVATE_API_REWRITE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
