# RSS Construction ERP — Netlify (frontend only)
#
# The Express API (apps/api) CANNOT run on Netlify — deploy it separately
# (Render, Railway, Fly.io, VPS, or Docker) and point API_ORIGIN to it.
#
# Required Netlify environment variables:
#   API_ORIGIN=https://your-api.example.com
#   CORS_ORIGINS=https://your-site.netlify.app  (set on the API host)
#   NEXT_PUBLIC_API_URL=/api
#   NEXT_PUBLIC_APP_URL=https://your-site.netlify.app
#
# Optional: set NEXT_PUBLIC_API_URL=https://your-api.example.com/api
# to call the API directly (skips /api proxy; CORS must allow your Netlify domain).

[build]
  command = "npm run build:netlify"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  # Frontend-only deploy: skip Prisma client generation during install
  SKIP_PRISMA_GENERATE = "true"
  NPM_FLAGS = "--include=dev"

[[plugins]]
  package = "@netlify/plugin-nextjs"
