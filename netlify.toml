# RSS Construction ERP — Netlify (frontend only)
#
# The Express API (apps/api) CANNOT run on Netlify — deploy it separately
# (Render, Railway, Fly.io, VPS, or Docker) and point API_ORIGIN to it.
#
# Required Netlify environment variables:
#   API_ORIGIN=https://your-api.example.com
#   NEXT_PUBLIC_API_URL=/api
#   NEXT_PUBLIC_APP_URL=https://your-site.netlify.app

[build]
  command = "npm run build:netlify"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  SKIP_PRISMA_GENERATE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
