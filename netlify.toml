# RSS Construction ERP — Netlify
#
# Builds the root-level Next.js app (src/) with API routes.
# DATABASE_URL and SESSION_SECRET must be set in Netlify environment variables.

[build]
  command = "npx prisma generate --schema=prisma/schema.prisma && next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SKIP_PRISMA_GENERATE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
