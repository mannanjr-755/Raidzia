# Render Blueprint — full-stack deploy (API + Web in one service)
# Both services start together via npm start (scripts/run-prod.ts).
#
# Set secrets in Render dashboard: DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET, CORS_ORIGINS

services:
  - type: web
    name: rss-erp
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: TRUST_PROXY
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: API_ORIGIN
        value: http://127.0.0.1:4000
      - key: ALLOW_PRIVATE_API_REWRITE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
