name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build full stack (shared + api + web)
        run: npm run build
        env:
          API_ORIGIN: http://127.0.0.1:4000
          NEXT_PUBLIC_API_URL: /api
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Verify build outputs exist
        run: |
          test -f apps/api/dist/index.js
          test -f packages/shared/dist/index.js
          test -d apps/web/.next

      - name: Verify production start script
        run: node -e "require('fs').accessSync('scripts/run-prod.ts')"
